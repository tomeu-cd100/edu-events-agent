sources:
  rss:
    # ═══════════════════════════════════════════════════════════════════
    # 🟥  CATALUNYA
    # ═══════════════════════════════════════════════════════════════════

    # 🔎 Descobert a HTML (té feed real)
    - name: Diari de l'Educació
      url: https://diarieducacio.cat/feed/

    # 🔎 Descobert a la pàgina de RSS del diari ARA
    - name: ARA - Societat (inclou educació)
      url: https://www.ara.cat/rss/societat/

    # ❓ Diari digital en català, secció educació
    - name: VilaWeb - Educació
      url: https://www.vilaweb.cat/categoria/societat/educacio/feed/

    # ❓ Revista cultural (inclou debats educatius)
    - name: Núvol - Educació
      url: https://www.nuvol.com/categoria/educacio/feed/

    # ❓ UOC - blog de tecnologies i comunicació multimèdia
    - name: UOC Mosaic
      url: https://mosaic.uoc.edu/feed/

    # ❓ UOC - Blog d'informàtica via FeedBurner
    - name: UOC Informàtica
      url: https://feeds.feedburner.com/uocinformatica

    # ❓ UOC - eLearn Center (publica articles sobre pedagogia digital)
    - name: UOC eLearn Center
      url: https://elc.blogs.uoc.edu/feed/

    # ❓ UOC - Blog Management & eLearning
    - name: UOC Management & eLearning
      url: https://blogs.uoc.edu/mel/feed/

    # ❓ Associació de mestres Rosa Sensat (activitats i reflexió pedagògica)
    - name: Rosa Sensat
      url: https://www2.rosasensat.org/feed/

    # ❓ Docents.cat — comunitat de docents catalans
    - name: Docents.cat
      url: https://docents.cat/feed/

    # ❓ Secció d'educació del portal Social.cat
    - name: Social.cat - Educació
      url: https://www.social.cat/rss/noticies/educacio

    # ═══════════════════════════════════════════════════════════════════
    # 🟧  ESPANYA - mitjans especialitzats
    # ═══════════════════════════════════════════════════════════════════

    # ✓ Verificat en sandbox
    - name: Educación 3.0
      url: https://www.educaciontrespuntocero.com/feed/

    # ✓ Verificat en sandbox
    - name: Magisnet
      url: https://www.magisnet.com/feed/

    # ✓ Ja t'ha funcionat al Windows
    - name: INTEF
      url: https://intef.es/feed/

    # ❓ Observatorio de Tecnología Educativa (INTEF, articles temàtics)
    - name: INTEF - Observatorio
      url: https://intef.es/observatorio/feed/

    # 🔎 Descobert a HTML
    - name: Hechos de Hoy - Educación
      url: https://hechosdehoy.com/categoria/educacion/feed/

    # ❓ Notícies del portal Educaweb (butlletí, convocatòries, màsters)
    - name: Educaweb - Notícies
      url: https://www.educaweb.com/rss/actualidad/

    # ❓ Portal amb agenda de jornades i formacions
    - name: Educación Activa
      url: https://educacionactiva.com/feed/

    # ❓ Revista InED21
    - name: Ined21
      url: https://ined21.com/feed/

    # ❓ El diario de la Educación (castellà, mateixa fundació que el català)
    - name: El Diario de la Educación (cast)
      url: https://eldiariodelaeducacion.com/feed/

    # ❓ Tiching - blog amb recursos didàctics
    - name: Tiching Blog
      url: https://blog.tiching.com/feed/

    # ❓ AulaPlaneta
    - name: AulaPlaneta
      url: https://www.aulaplaneta.com/feed/

    # ❓ Revista acadèmica "Profesorado" (universitat de Granada)
    - name: Revista Profesorado (UGR)
      url: https://revistaseug.ugr.es/index.php/profesorado/gateway/plugin/WebFeedGatewayPlugin/rss2

    # ═══════════════════════════════════════════════════════════════════
    # 🟨  IA + EDUCACIÓ (focus específic)
    # ═══════════════════════════════════════════════════════════════════

    # ❓ Hack Education (Audrey Watters / similars)
    - name: Hack Education
      url: https://hackeducation.com/feed.xml

    # ❓ AI for Education
    - name: AI for Education
      url: https://www.aiforeducation.io/blog-feed.xml

    # ❓ MIT J-WEL (programa d'aprenentatge al món)
    - name: MIT J-WEL
      url: https://jwel.mit.edu/feed

    # ═══════════════════════════════════════════════════════════════════
    # 🟦  INTERNACIONAL — edtech / higher ed
    # ═══════════════════════════════════════════════════════════════════

    # ✓ Verificat en sandbox
    - name: EDUCAUSE Review
      url: https://er.educause.edu/rss

    # ✓ Verificat en sandbox
    - name: The Journal
      url: https://thejournal.com/rss-feeds/all-articles.aspx

    # ✓ Ja t'ha funcionat al Windows
    - name: EdSurge
      url: https://www.edsurge.com/articles_rss

    # ❓ Revista de referència
    - name: Campus Technology
      url: https://campustechnology.com/rss-feeds/all-articles.aspx

    # ❓ Notícies K-12
    - name: eSchool News
      url: https://www.eschoolnews.com/feed/

    # ❓ EdTech Magazine
    - name: EdTech Magazine K-12
      url: https://edtechmagazine.com/k12/rss

    # ❓ Inside Higher Ed
    - name: Inside Higher Ed
      url: https://www.insidehighered.com/rss.xml

    # ❓ Chronicle of Higher Education
    - name: Chronicle of Higher Ed
      url: https://www.chronicle.com/section/news/rss

    # ❓ Class Central — MOOCs i cursos oberts
    - name: Class Central Report
      url: https://www.classcentral.com/report/feed/

    # ❓ eLearning Industry
    - name: eLearning Industry
      url: https://elearningindustry.com/feed

    # ═══════════════════════════════════════════════════════════════════
    # 🟪  RECERCA / PAPERS (per detectar jornades i publicacions amb esdev.)
    # ═══════════════════════════════════════════════════════════════════

    # ❓ ArXiv Computers and Society (IA + societat + educació)
    - name: ArXiv cs.CY
      url: https://export.arxiv.org/rss/cs.CY

    # ❓ MIT News - Education
    - name: MIT News Education
      url: https://news.mit.edu/rss/topic/education


filter:
  min_score: 2
  title_weight: 2

  # ─────────────────────────────────────────────────────────────────────
  # CATEGORIES — agrupen les troballes al correu per temàtica.
  # Ordre = prioritat: la PRIMERA regla que matxegi guanya.
  # Si un event no matxeja amb cap, cau a la categoria marcada amb
  # `default: true` (o a "Altres" per defecte).
  # ─────────────────────────────────────────────────────────────────────
  categories:
    - name: "📚 Formació per a docents"
      match_any:
        - formació professorat
        - formación profesorado
        - formació docent
        - formación docente
        - teacher training
        - professional development
        - curs professorat
        - curso profesorado
        - curs per a docents
        - curso para docentes
        - curso para profesores
        - taller docent
        - taller per a docents
        - taller para docentes
        - formació permanent
        - formación permanente

    - name: "🎓 Màsters i postgraus"
      match_any:
        - màster
        - máster
        - master's
        - masters degree
        - postgrau
        - postgrado
        - doctorat
        - doctorado
        - PhD

    - name: "🎤 Jornades i congressos"
      match_any:
        - jornada
        - jornades
        - congrés
        - congressos
        - congreso
        - congresos
        - conference
        - conferences
        - simposi
        - simposio
        - symposium
        - trobada
        - encuentro

    - name: "💻 Seminaris i webinars"
      match_any:
        - webinar
        - webinars
        - seminari
        - seminario
        - seminar
        - masterclass
        - curs online
        - curso online

    - name: "📰 Articles i novetats"
      default: true

  require_any:
    # català
    - educació
    - educativa
    - educatiu
    - docent
    - docents
    - professor
    - professorat
    - aula
    - alumnat
    - escola
    - institut
    - secundària
    - ESO
    - batxillerat
    - FP
    - universitat
    - formació
    - pedagogia
    - didàctica
    - edtech
    # anglès
    - teacher
    - teachers
    - teaching
    - classroom
    - student
    - students
    - school
    - K-12
    - higher education
    - learning
    - education
    # castellà
    - educación
    - educativo
    - docente
    - docentes
    - profesor
    - profesorado
    - alumnado
    - escuela
    - instituto
    - secundaria
    - bachillerato
    - formación
    - enseñanza
    - colegio

  positive_terms:
    # IA i tecnologia
    - intel·ligència artificial
    - inteligencia artificial
    - artificial intelligence
    - IA
    - AI
    - LLM
    - LLMs
    - ChatGPT
    - Claude
    - Copilot
    - Gemini
    - machine learning
    - deep learning
    - generative AI
    - IA generativa

    # Edtech general
    - edtech
    - innovació educativa
    - innovación educativa
    - gamificació
    - gamificación
    - avaluació competencial
    - competències digitals
    - competencias digitales
    - DigComp
    - aprenentatge basat
    - aprendizaje basado
    - personalized learning

    # TIC educativa
    - Google Workspace
    - Classroom
    - Chromebook
    - ciberseguretat
    - ciberseguridad
    - cybersecurity

    # Formació professorat
    - formació professorat
    - formación profesorado
    - formació docent
    - professional development
    - teacher training

    # Nivell / matèria
    - ESO
    - secundària
    - secondary
    - física
    - physics
    - química
    - chemistry
    - ciències
    - STEM

    # Formats d'interès
    - jornada
    - congrés
    - congreso
    - conference
    - seminari
    - seminario
    - seminar
    - webinar
    - simposi
    - simposio
    - symposium
    - postgrau
    - postgrado
    - máster
    - màster

  negative_terms:
    # català
    - educació infantil
    - infantil
    - preescolar
    - guarderia
    - parvulari
    - cicle inicial
    - cicle mitjà
    # castellà
    - educación infantil
    - preescolar
    - guardería
    - parvulario
    - primaria
    # anglès
    - kindergarten
    - preschool
    - elementary school
    - early childhood
